<!doctype html>
<html>
<head><title>Icon Generator — Manga Match!</title></head>
<body style="background:#222;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
<h1>Manga Match! Icon Generator</h1>
<p>Right-click each icon and "Save Image As..." to <code>assets/</code></p>
<div style="display:flex;gap:40px;justify-content:center;margin-top:30px">
  <div>
    <canvas id="c192" width="192" height="192"></canvas>
    <p>icon-192.png</p>
  </div>
  <div>
    <canvas id="c512" width="512" height="512"></canvas>
    <p>icon-512.png</p>
  </div>
</div>
<script>
function draw(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext("2d");
  const r = s * 0.15;

  // Rounded rect background
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fillStyle = "#1a2142";
  ctx.fill();

  // Gradient overlay
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, "#26457f80");
  grad.addColorStop(0.5, "#6f2f6040");
  grad.addColorStop(1, "#12213f80");
  ctx.fillStyle = grad;
  ctx.fill();

  // Border
  ctx.lineWidth = s * 0.025;
  ctx.strokeStyle = "#8af8ff60";
  ctx.stroke();

  // Star burst behind text
  const cx = s / 2, cy = s * 0.38;
  ctx.save();
  ctx.translate(cx, cy);
  for (let i = 0; i < 8; i++) {
    ctx.rotate(Math.PI / 4);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-s*0.02, -s*0.22);
    ctx.lineTo(s*0.02, -s*0.22);
    ctx.closePath();
    ctx.fillStyle = "#ffc84a18";
    ctx.fill();
  }
  ctx.restore();

  // "M" letter
  ctx.font = `800 ${s * 0.42}px "Trebuchet MS", sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#ff4a6d";
  ctx.fillText("M", cx, cy);

  // Outline
  ctx.strokeStyle = "#ffffff30";
  ctx.lineWidth = s * 0.012;
  ctx.strokeText("M", cx, cy);

  // "!" accent
  ctx.font = `800 ${s * 0.28}px "Trebuchet MS", sans-serif`;
  ctx.fillStyle = "#ffc84a";
  ctx.fillText("!", cx + s * 0.22, cy - s * 0.06);

  // Japanese subtitle
  ctx.font = `700 ${s * 0.09}px sans-serif`;
  ctx.fillStyle = "#8af8ffcc";
  ctx.fillText("マッチ", cx, s * 0.68);

  // "MATCH" text
  ctx.font = `700 ${s * 0.065}px "Trebuchet MS", sans-serif`;
  ctx.letterSpacing = `${s * 0.015}px`;
  ctx.fillStyle = "#c8d0f0aa";
  ctx.fillText("MANGA MATCH", cx, s * 0.82);
}

draw(document.getElementById("c192"));
draw(document.getElementById("c512"));
</script>
</body>
</html>
